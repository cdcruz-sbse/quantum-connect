<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Workplace Insights</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F7FB;
    --surface: #FFFFFF;
    --surface-hover: #F2F3F8;
    --text: #14172B;
    --text-secondary: #5A5E78;
    --text-muted: #9295A8;
    --accent: #4B3FD9;
    --accent-soft: #EEEAFF;
    --accent-hover: #3B30B8;
    --green: #1BA362;
    --green-soft: #E4F8EE;
    --amber: #D9920B;
    --amber-soft: #FFF6E0;
    --red: #D94444;
    --red-soft: #FFECEC;
    --teal: #0D9CA6;
    --teal-soft: #E2F6F7;
    --blue: #2E7DD6;
    --blue-soft: #E8F1FC;
    --border: #E4E5ED;
    --border-light: #EEEFF4;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(20,23,43,0.04), 0 4px 12px rgba(20,23,43,0.03);
    --shadow-hover: 0 2px 8px rgba(20,23,43,0.07), 0 8px 24px rgba(20,23,43,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .widget {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 18px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .card.hoverable:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
    cursor: pointer;
  }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .stat-card { text-align: center; padding: 14px 10px; }
  .stat-value { font-size: 26px; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center;
    font-size: 10px; font-weight: 700; padding: 3px 7px;
    border-radius: 5px; letter-spacing: 0.02em; line-height: 1.2;
    text-transform: uppercase;
  }
  .badge--green  { color: var(--green);  background: var(--green-soft); }
  .badge--amber  { color: var(--amber);  background: var(--amber-soft); }
  .badge--red    { color: var(--red);    background: var(--red-soft); }
  .badge--accent { color: var(--accent); background: var(--accent-soft); }
  .badge--teal   { color: var(--teal);   background: var(--teal-soft); }
  .badge--blue   { color: var(--blue);   background: var(--blue-soft); }

  /* Section headers */
  .section-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .section-header__left { display: flex; align-items: center; gap: 8px; }
  .section-header__left span { font-size: 16px; }
  .section-header__left h3 {
    font-size: 13px; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase;
  }
  .section-header__action {
    background: none; border: none; color: var(--accent); font-size: 12px;
    font-weight: 600; cursor: pointer; padding: 2px 4px; border-radius: 4px;
    font-family: inherit; transition: color 0.15s;
  }
  .section-header__action:hover { color: var(--accent-hover); }

  /* Row items */
  .row-item {
    padding: 12px 14px; background: var(--surface-hover); border-radius: var(--radius-sm);
    margin-bottom: 8px; cursor: pointer; transition: background 0.15s;
  }
  .row-item:last-child { margin-bottom: 0; }
  .row-item:hover { background: var(--border-light); }

  /* Goals */
  .goal-row { display: flex; align-items: center; gap: 12px; }
  .goal-icon {
    width: 36px; height: 36px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .goal-body { flex: 1; min-width: 0; }
  .goal-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .goal-bottom { display: flex; justify-content: space-between; align-items: center; }
  .progress-track {
    flex: 1; position: relative; height: 5px; background: var(--border);
    border-radius: 3px; overflow: hidden; margin-right: 10px;
  }
  .progress-fill {
    position: absolute; top: 0; left: 0; height: 100%; border-radius: 3px;
    width: 0; transition: width 1s ease-out;
  }
  .goal-pct { font-size: 11px; font-weight: 700; flex-shrink: 0; }

  /* 1-on-1 */
  .oo-row { display: flex; align-items: center; gap: 12px; }
  .oo-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .oo-body { flex: 1; min-width: 0; }
  .oo-name { font-size: 13px; font-weight: 600; }
  .oo-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .oo-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .oo-date { font-size: 11px; font-weight: 600; color: var(--text-secondary); }

  /* Feedback */
  .fb-row { display: flex; align-items: center; gap: 12px; }
  .fb-icon {
    width: 36px; height: 36px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .fb-body { flex: 1; min-width: 0; }
  .fb-title { font-size: 13px; font-weight: 600; }
  .fb-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .fb-right { flex-shrink: 0; }

  /* Pulse ring */
  .pulse-ring-wrap { position: relative; width: 80px; height: 80px; margin: 0 auto 6px; }
  .pulse-ring-bg, .pulse-ring-fg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    fill: none; stroke-width: 6; transform: rotate(-90deg); transform-origin: center;
  }
  .pulse-ring-bg { stroke: var(--border); }
  .pulse-ring-fg {
    stroke: var(--accent); stroke-linecap: round;
    transition: stroke-dashoffset 1.2s ease-out;
  }
  .pulse-value {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 22px; font-weight: 800; color: var(--accent);
  }
  .pulse-label {
    text-align: center; font-size: 11px; font-weight: 600; color: var(--text-secondary);
  }

  /* Divider */
  .card-divider { height: 1px; background: var(--border-light); margin: 14px 0; }
</style>
</head>
<body>

<div class="widget" id="widget"></div>

<script>
const QW_URL = "https://app.quantumworkplace.com";

const DATA = {
  pulse: {
    engagementScore: 78,
    lastSurvey: "May Pulse",
    actionItems: 2
  },
  goals: [
    { id: 1, name: "Complete Q2 product launch deliverables", progress: 85, status: "on-track", dueDate: "Jun 30" },
    { id: 2, name: "Improve NPS score by 10 points", progress: 52, status: "at-risk", dueDate: "Jul 15" },
    { id: 3, name: "Ship accessibility audit findings", progress: 100, status: "complete", dueDate: "May 15" }
  ],
  feedback: [
    { id: 1, type: "request", title: "Peer feedback requested", desc: "From Maya T. · Project Compass review", dueDate: "May 22", urgent: true },
    { id: 2, type: "received", title: "New feedback from Sam R.", desc: "About your sprint demo presentation", time: "1d ago", urgent: false }
  ],
  recognition: {
    received: 7,
    given: 4,
    latest: [
      { id: 1, from: "Amir B.", message: "Crushed the client demo — energy was amazing", emoji: "⚡", time: "3h ago" },
      { id: 2, from: "Leah M.", message: "Thank you for jumping in on the data migration", emoji: "🙌", time: "2d ago" }
    ]
  }
};

function openLink(path) { window.open(`${QW_URL}${path}`, "_blank"); }

function goalColor(status) {
  if (status === "complete") return "var(--green)";
  if (status === "at-risk") return "var(--amber)";
  return "var(--accent)";
}
function goalBg(status) {
  if (status === "complete") return "var(--green-soft)";
  if (status === "at-risk") return "var(--amber-soft)";
  return "var(--accent-soft)";
}
function goalBadge(status) {
  if (status === "complete") return '<span class="badge badge--green">✓ Complete</span>';
  if (status === "at-risk") return '<span class="badge badge--amber">⚠ At Risk</span>';
  return '<span class="badge badge--accent">On Track</span>';
}

function render() {
  const d = DATA;
  const circ = 2 * Math.PI * 34;
  const offset = circ - (d.pulse.engagementScore / 100) * circ;

  document.getElementById("widget").innerHTML = `

    <!-- Top Stats -->
    <div class="stat-grid">
      <div class="card hoverable stat-card" onclick="openLink('/surveys')">
        <div class="stat-value" style="color:var(--accent)">${d.pulse.engagementScore}</div>
        <div class="stat-label">Engagement</div>
      </div>
      <div class="card hoverable stat-card" onclick="openLink('/goals')">
        <div class="stat-value" style="color:var(--green)">${d.goals.filter(g => g.status === "complete").length}/${d.goals.length}</div>
        <div class="stat-label">Goals Done</div>
      </div>
      <div class="card hoverable stat-card" onclick="openLink('/recognition')">
        <div class="stat-value" style="color:var(--teal)">${d.recognition.received}</div>
        <div class="stat-label">Recognitions</div>
      </div>
    </div>

    <!-- Goals -->
    <div class="card">
      <div class="section-header">
        <div class="section-header__left">
          <span>🎯</span>
          <h3>My Goals</h3>
        </div>
        <button class="section-header__action" onclick="openLink('/goals')">View All →</button>
      </div>
      ${d.goals.map(g => `
        <div class="row-item" onclick="openLink('/goals/${g.id}')">
          <div class="goal-row">
            <div class="goal-icon" style="background:${goalBg(g.status)}">
              ${g.status === "complete" ? "✅" : g.status === "at-risk" ? "⚠️" : "🎯"}
            </div>
            <div class="goal-body">
              <div class="goal-name">${g.name}</div>
              <div class="goal-bottom">
                <div class="progress-track">
                  <div class="progress-fill" data-width="${g.progress}%" style="background:${goalColor(g.status)}"></div>
                </div>
                <span class="goal-pct" style="color:${goalColor(g.status)}">${g.progress}%</span>
              </div>
            </div>
          </div>
        </div>
      `).join("")}
    </div>

    <!-- Feedback -->
    <div class="card">
      <div class="section-header">
        <div class="section-header__left">
          <span>📝</span>
          <h3>Feedback</h3>
        </div>
        <button class="section-header__action" onclick="openLink('/feedback')">Give Feedback →</button>
      </div>
      ${d.feedback.map(f => `
        <div class="row-item" onclick="openLink('/feedback/${f.id}')">
          <div class="fb-row">
            <div class="fb-icon" style="background:${f.type === "request" ? "var(--amber-soft)" : "var(--green-soft)"}">
              ${f.type === "request" ? "📩" : "💌"}
            </div>
            <div class="fb-body">
              <div class="fb-title">${f.title}</div>
              <div class="fb-desc">${f.desc}${f.dueDate ? " · Due " + f.dueDate : ""}</div>
            </div>
            <div class="fb-right">
              ${f.urgent
                ? '<span class="badge badge--red">Action Needed</span>'
                : '<span class="badge badge--green">New</span>'}
            </div>
          </div>
        </div>
      `).join("")}
    </div>

    <!-- Recognition -->
    <div class="card">
      <div class="section-header">
        <div class="section-header__left">
          <span>🏆</span>
          <h3>Recognition</h3>
        </div>
        <button class="section-header__action" onclick="openLink('/recognition')">Recognize Someone →</button>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:14px;">
        <div style="flex:1;padding:10px 14px;border-radius:var(--radius-sm);background:var(--accent-soft);text-align:center;">
          <span style="font-size:22px;font-weight:800;color:var(--accent)">${d.recognition.received}</span>
          <div style="font-size:11px;font-weight:600;color:var(--accent)">Received</div>
        </div>
        <div style="flex:1;padding:10px 14px;border-radius:var(--radius-sm);background:var(--teal-soft);text-align:center;">
          <span style="font-size:22px;font-weight:800;color:var(--teal)">${d.recognition.given}</span>
          <div style="font-size:11px;font-weight:600;color:var(--teal)">Given</div>
        </div>
      </div>
      ${d.recognition.latest.map(k => `
        <div class="row-item" onclick="openLink('/recognition')" style="display:flex;gap:12px;padding:11px 12px;">
          <span style="font-size:22px;line-height:1">${k.emoji}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;line-height:1.4;">
              <span style="font-weight:700">${k.from}</span>
              <span style="color:var(--text-secondary)">${k.message}</span>
            </div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:3px;">${k.time}</div>
          </div>
        </div>
      `).join("")}
    </div>
  `;

  // Animate progress bars
  requestAnimationFrame(() => {
    document.querySelectorAll(".progress-fill").forEach(el => {
      el.style.width = el.dataset.width;
    });
  });
}

render();
</script>
</body>
</html>
